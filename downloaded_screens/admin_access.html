<style>
        /* Base typography reset to enforce theme fonts globally if not applied by utility classes */
        body {
            font-family: 'Work Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Subtle elevation mimicking premium stationery */
        .shadow-architectural {
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Ambient background texture/element for institutional feel without being overwhelming -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #1a1c1c 1px, transparent 1px); background-size: 24px 24px;"></div>
<main class="w-full max-w-[480px] bg-surface-container-lowest border border-surface-dim shadow-architectural z-10 relative">
<!-- Top Accent Line -->
<div class="h-1 w-full bg-primary"></div>
<div class="p-lg md:p-xl flex flex-col gap-lg">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center gap-sm">
<div class="flex items-center justify-center gap-xs mb-sm">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">
                        account_balance
                    </span>
<h1 class="font-balance-display text-balance-display text-on-background tracking-tight">
                        BEACON CAPITAL
                    </h1>
</div>
<!-- Separator line for hierarchy -->
<div class="w-16 h-[1px] bg-surface-dim"></div>
<h2 class="font-headline-md text-headline-md text-tertiary mt-sm">
                    Staff Command Center - Secure Ledger Access
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">
                    Authorized institutional personnel only.
                </p>
</div>
<!-- Authentication Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-background uppercase tracking-wider" for="admin-email">
                        Institutional ID
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-lg">
                                badge
                            </span>
</div>
<input class="w-full bg-surface-bright border border-surface-dim rounded-none py-sm pl-[40px] pr-sm font-body-md text-body-md text-on-background focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-tertiary-fixed-dim" id="admin-email" name="admin-email" placeholder="enter ID or domain email" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-baseline">
<label class="font-label-sm text-label-sm text-on-background uppercase tracking-wider" for="admin-password">
                            Security Key
                        </label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-lg">
                                key
                            </span>
</div>
<input class="w-full bg-surface-bright border border-surface-dim rounded-none py-sm pl-[40px] pr-sm font-body-md text-body-md text-on-background focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-tertiary-fixed-dim tracking-widest" id="admin-password" name="admin-password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Session Options -->
<div class="flex items-center justify-between mt-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-4 h-4 border border-surface-dim rounded-none bg-surface-bright checked:bg-primary checked:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-colors" type="checkbox"/>
<span class="material-symbols-outlined text-[14px] text-on-primary absolute opacity-0 peer-checked:opacity-100 pointer-events-none" style="font-variation-settings: 'FILL' 1;">
                                check
                            </span>
</div>
<span class="font-label-sm text-label-sm text-tertiary group-hover:text-on-background transition-colors">Maintain active session</span>
</label>
</div>
<!-- Call to Action -->
<button class="mt-sm w-full bg-primary text-on-primary font-label-sm text-label-sm uppercase tracking-wider py-md px-lg rounded-none hover:bg-on-primary-fixed-variant active:bg-on-primary-fixed transition-colors flex items-center justify-center gap-sm border border-transparent" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">
                        shield_lock
                    </span>
                    Authenticate Admin
                </button>
</form>
</div>
<!-- Footer Info -->
<div class="bg-surface-container p-sm border-t border-surface-dim flex justify-center items-center gap-xs text-tertiary">
<span class="material-symbols-outlined text-[16px]">
                lock
            </span>
<span class="font-label-sm text-label-sm text-[10px] tracking-widest uppercase">
                256-bit Encryption Active
            </span>
</div>
</main>
