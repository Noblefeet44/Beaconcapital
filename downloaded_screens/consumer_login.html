<body class="bg-background min-h-screen flex flex-col antialiased">
<!-- Top Banner -->
<header class="bg-primary w-full h-40 flex flex-col items-center justify-center relative shadow-sm">
<div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDIiLz4KPHBhdGggZD0iTTAgMEw4IDhaTTAgOEw4IDBaIiBzdHJva2U9IiMwMDAiIHN0cm9rZS1vcGFjaXR5PSIwLjA1IiBzdHJva2Utd2lkdGg9IjEiLz4KPC9zdmc+')] opacity-50"></div>
<div class="flex items-center gap-3 relative z-10">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1; font-size: 36px;">account_balance</span>
<h1 class="font-headline-md text-headline-md font-bold text-on-primary tracking-tight">BEACON CAPITAL</h1>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 px-margin-mobile flex flex-col -mt-10 relative z-20">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-surface-variant p-md shadow-[0px_4px_8px_rgba(0,0,0,0.04)] w-full max-w-[400px] mx-auto">
<div class="border-b border-surface-variant pb-sm mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Secure Access</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Consumer Account Portal</p>
</div>
<form class="flex flex-col gap-md">
<!-- User ID Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-background" for="username">User ID / Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">person</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant pl-10 pr-sm py-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 outline-none transition-colors rounded-none placeholder:text-surface-dim" id="username" placeholder="Enter your User ID" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-background" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant pl-10 pr-sm py-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 outline-none transition-colors rounded-none placeholder:text-surface-dim" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Secondary Actions -->
<div class="flex justify-between items-center mt-xs">
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-4 h-4 border-surface-variant text-primary focus:ring-primary rounded-none bg-surface-container-lowest" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant">Remember ID</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot credentials?</a>
</div>
<!-- Primary Action -->
<button class="mt-sm w-full bg-primary text-on-primary font-label-sm text-label-sm py-sm px-md rounded-none hover:bg-primary-container transition-colors flex items-center justify-center gap-2" type="button">
                    Log In securely
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
</div>
<!-- Security Badge -->
<div class="mt-xl flex justify-center items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 18px;">verified_user</span>
<span class="font-label-sm text-label-sm">256-bit Encrypted Connection</span>
</div>

<span class="material-symbols-outlined" style="font-size: 14px;">admin_panel_settings</span>
            System Administrator Access
